$schema: "https://moonrepo.dev/schemas/project.json"

layer: "application"
stack: "frontend"
language: "typescript"

tasks:
  dev:
    command: "pnpm exec vite"
    preset: "server"
  build:
    command: "pnpm exec vite build"
    outputs:
      - "dist"
  typecheck:
    command: "pnpm exec tsc --noEmit"
