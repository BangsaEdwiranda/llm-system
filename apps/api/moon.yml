$schema: "https://moonrepo.dev/schemas/project.json"

layer: "application"
stack: "backend"
language: "python"

tasks:
  install:
    command: "pip install -e .[dev]"
    options:
      cache: false
      runInCI: false
  gen-proto:
    command: "python -m grpc_tools.protoc -I src/speechify_api/proto --python_out=src/speechify_api/proto --grpc_python_out=src/speechify_api/proto src/speechify_api/proto/speechify.proto"
    options:
      cache: false
      runInCI: false
  seed:
    command: "python -m speechify_api.seed"
    options:
      cache: false
      runInCI: false
  test:
    command: "pytest"
    inputs:
      - "src/**/*"
      - "tests/**/*"
  dev:
    command: "uvicorn speechify_api.http_app:app --reload"
    preset: "server"
